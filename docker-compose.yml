services:
  curatorr:
    container_name: curatorr
    image: curatorr:latest
    ports:
      - "7676:7676"
    environment:
      - CONFIG_PATH=/app/config/config.json
      - DATA_DIR=/app/data
      - BASE_URL=http://localhost:7676
      - TRUST_PROXY=true
      - TRUST_PROXY_HOPS=1
      # Allow Launcharr or another dashboard to embed Curatorr in an iframe.
      # Example: EMBED_ALLOWED_ORIGINS=http://localhost:3333
      # - EMBED_ALLOWED_ORIGINS=http://localhost:3333
      # Generate once: openssl rand -hex 32
      - SESSION_SECRET=replace-this-with-a-random-secret
      # Optional override. If omitted, Curatorr generates and stores a webhook key in config.
      - WEBHOOK_SECRET=replace-this-with-a-random-secret
      # optional but recommended if you only use HTTPS on domain:
      # - COOKIE_SECURE=true
      # - PUID=${PUID}
      # - PGID=${PGID}
      # - TZ=${TZ}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./data/icons/custom:/app/public/icons/custom
    network_mode: bridge
    restart: unless-stopped
